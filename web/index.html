<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Converter</title>
    <style>
        :root {
            --bg: #0d1117;
            --screen-bg: #0a0f0a;
            --phosphor: #33ff33;
            --phosphor-dim: #1a801a;
            --phosphor-glow: rgba(51, 255, 51, 0.4);
            --text-dim: #1a3a1a;
            --border: #1a3a1a;
            --font: 'Courier New', Courier, monospace;
        }

        [data-theme="light"] {
            --bg: #e8e8e8;
            --screen-bg: #f0f0e8;
            --phosphor: #006600;
            --phosphor-dim: #4a4a4a;
            --phosphor-glow: rgba(0, 102, 0, 0.3);
            --text-dim: #888;
            --border: #aaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--phosphor);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.4;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1rem;
            font-weight: normal;
            letter-spacing: 2px;
        }

        h1::before {
            content: ">> ";
            color: var(--phosphor-dim);
        }

        .theme-select {
            font-family: var(--font);
            font-size: 0.85rem;
            padding: 0.3rem 0.6rem;
            background: transparent;
            color: var(--phosphor);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .theme-select:focus {
            outline: none;
            border-color: var(--phosphor);
            box-shadow: 0 0 8px var(--phosphor-glow);
        }

        .screen {
            background: var(--screen-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.2) 100%);
            pointer-events: none;
        }

        .prompt {
            margin-bottom: 1rem;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .prompt-symbol {
            color: var(--phosphor);
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--phosphor-dim);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        input[type="text"], select {
            font-family: var(--font);
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            background: transparent;
            color: var(--phosphor);
            border: 1px solid var(--border);
            width: 100%;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--phosphor);
            box-shadow: 0 0 8px var(--phosphor-glow);
        }

        select option {
            background: var(--screen-bg);
            color: var(--phosphor);
        }

        button {
            font-family: var(--font);
            font-size: 0.9rem;
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--phosphor);
            border: 1px solid var(--phosphor);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.15s;
            margin-top: 0.5rem;
        }

        button:hover:not(:disabled) {
            background: var(--phosphor);
            color: var(--screen-bg);
            box-shadow: 0 0 15px var(--phosphor-glow);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .output {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
        }

        .output.show {
            display: block;
        }

        .output-header {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: var(--phosphor);
        }

        .bit-display {
            display: flex;
            justify-content: flex-start;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .bit-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .bit-label {
            font-size: 0.7rem;
            color: var(--phosphor-dim);
            text-transform: uppercase;
        }

        .bit-value {
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 0.3rem 0;
        }

        .results {
            display: grid;
            gap: 0.5rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 0.25rem 0;
            border-bottom: 1px dotted var(--border);
        }

        .result-label {
            color: var(--phosphor-dim);
        }

        .result-value {
            text-align: right;
        }

        .status {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border: 1px solid currentColor;
            font-size: 0.75rem;
        }

        .status-fits { color: var(--phosphor); }
        .status-overflow { color: #ff6b6b; }
        .status-underflow { color: #ffd93d; }

        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 0.75rem;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 0.85rem;
        }

        .error-box.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--phosphor-dim);
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .input-row { grid-template-columns: 1fr; }
            .bit-display { flex-direction: column; gap: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FLOAT CONVERTER</h1>
            <select class="theme-select" id="theme" onchange="setTheme(this.value)">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark" selected>Dark</option>
            </select>
        </header>

        <div class="screen">
            <div class="prompt">
                <div class="prompt-line">
                    <span class="prompt-symbol">></span>
                    <span>Enter value to convert:</span>
                </div>
                <input type="text" id="number" value="0.125" placeholder="e.g., 0.125 or 1e-10">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="format">Format</label>
                    <select id="format">
                        <option value="float32">Float32</option>
                        <option value="bfloat16">BFloat16</option>
                        <option value="float16">Float16</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="round-mode">Rounding</label>
                    <select id="round-mode">
                        <option value="rne">Nearest Even</option>
                        <option value="rno">Nearest Odd</option>
                        <option value="rtz">Towards Zero</option>
                        <option value="rtposinf">Towards +Inf</option>
                        <option value="rtneginf">Towards -Inf</option>
                        <option value="rthalfzero">Half to Zero</option>
                        <option value="rthalfposinf">Half to +Inf</option>
                        <option value="rthalfneginf">Half to -Inf</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="overflow-mode">Overflow</label>
                    <select id="overflow-mode">
                        <option value="satmax">Saturate Max</option>
                        <option value="satinf">Saturate Inf</option>
                        <option value="nan">NaN</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="underflow-mode">Underflow</label>
                    <select id="underflow-mode">
                        <option value="satmin">Saturate Min</option>
                        <option value="flushzero">Flush to Zero</option>
                    </select>
                </div>
            </div>

            <button id="convert-btn" onclick="performConvert()" disabled>Convert</button>

            <div class="output" id="output">
                <div class="output-header">
                    <span>> CONVERSION RESULT<span class="cursor-blink">_</span></span>
                </div>
                <div class="bit-display">
                    <div class="bit-group">
                        <span class="bit-label">Sign</span>
                        <span class="bit-value" id="bit-sign">0</span>
                    </div>
                    <div class="bit-group">
                        <span class="bit-label">Exponent</span>
                        <span class="bit-value" id="bit-exponent">00000000</span>
                    </div>
                    <div class="bit-group">
                        <span class="bit-label">Mantissa</span>
                        <span class="bit-value" id="bit-mantissa">00000000000000000000000</span>
                    </div>
                </div>
                <div class="results">
                    <div class="result-row">
                        <span class="result-label">Decimal</span>
                        <span class="result-value" id="res-decimal">1.25e-01</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Hexfloat</span>
                        <span class="result-value" id="res-hexfloat">0x1p-03</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Binary</span>
                        <span class="result-value" id="res-binary">0b00111110000000000000000000000000</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Hexadecimal</span>
                        <span class="result-value" id="res-hex">0x3e000000</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Accuracy</span>
                        <span class="result-value" id="res-accuracy">Exact</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Error</span>
                        <span class="result-value" id="res-error">0e+00</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Status</span>
                        <span class="result-value" id="res-status">FITS</span>
                    </div>
                </div>
            </div>

            <div class="error-box" id="error-box"></div>
        </div>
    </div>

    <div class="loading" id="loading">
        <p>INITIALIZING WEB ASSEMBLY<span class="cursor-blink">_</span></p>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const themeSelect = document.getElementById('theme');

        function setTheme(theme) {
            if (theme === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            localStorage.setItem('float-conv-theme', theme);
        }

        (function initTheme() {
            const saved = localStorage.getItem('float-conv-theme');
            if (saved) {
                themeSelect.value = saved;
                setTheme(saved);
            } else {
                setTheme('dark');
            }
        })();

        let wasmReady = false;

        async function initWasm() {
            try {
                const go = new Go();
                const response = await fetch('float_conv.wasm');
                const bytes = await response.arrayBuffer();
                const { instance } = await WebAssembly.instantiate(bytes, go.importObject);
                go.run(instance);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('convert-btn').disabled = false;
                wasmReady = true;
            } catch (err) {
                document.getElementById('loading').innerHTML = '<p style="color:#ff6b6b;">WASM LOAD FAILED: ' + err.message + '</p>';
            }
        }

        function performConvert() {
            if (!wasmReady) return;

            const number = document.getElementById('number').value;
            const format = document.getElementById('format').value;
            const roundMode = document.getElementById('round-mode').value;
            const overflowMode = document.getElementById('overflow-mode').value;
            const underflowMode = document.getElementById('underflow-mode').value;

            const result = window.floatConvConvert(number, format, roundMode, overflowMode, underflowMode);

            try {
                const data = JSON.parse(result);
                displayResult(data);
            } catch (e) {
                showError('PARSE ERROR: ' + result);
            }
        }

        function displayResult(data) {
            document.getElementById('error-box').classList.remove('show');
            document.getElementById('output').classList.add('show');

            document.getElementById('bit-sign').textContent = data.sign;
            document.getElementById('bit-exponent').textContent = data.exponent;
            document.getElementById('bit-mantissa').textContent = data.mantissa;
            document.getElementById('res-decimal').textContent = data.decimal;
            document.getElementById('res-hexfloat').textContent = data.hexfloat;
            document.getElementById('res-binary').textContent = data.binary;
            document.getElementById('res-hex').textContent = data.hexadecimal;
            document.getElementById('res-accuracy').textContent = data.accuracy;
            document.getElementById('res-error').textContent = data.error;

            const statusEl = document.getElementById('res-status');
            const statusClass = data.status === 'Overflow' ? 'status-overflow' :
                               data.status === 'Underflow' ? 'status-underflow' : 'status-fits';
            statusEl.innerHTML = '<span class="status ' + statusClass + '">' + data.status + '</span>';
        }

        function showError(msg) {
            document.getElementById('output').classList.remove('show');
            document.getElementById('error-box').classList.add('show');
            document.getElementById('error-box').textContent = msg;
        }

        initWasm();
    </script>
</body>
</html>
