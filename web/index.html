<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float-Conv Web</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #00d9ff;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f0f23;
            color: #fff;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #result {
            display: none;
        }
        #result.show {
            display: block;
        }
        .result-header {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 1rem;
        }
        .bit-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .bit-table th, .bit-table td {
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #333;
        }
        .bit-table th {
            background: #0f0f23;
            color: #00d9ff;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #333;
        }
        .result-label {
            color: #888;
        }
        .result-value {
            color: #fff;
            font-family: monospace;
        }
        .status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .status-fits { background: #00d9ff; color: #000; }
        .status-overflow { background: #ff6b6b; color: #000; }
        .status-underflow { background: #ffd93d; color: #000; }
        .error {
            color: #ff6b6b;
            padding: 1rem;
            background: rgba(255,107,107,0.1);
            border-radius: 6px;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Float-Conv Web</h1>
        
        <div class="card" id="input-card">
            <div class="form-group">
                <label for="number">Input Number</label>
                <input type="text" id="number" placeholder="e.g., 0.125 or 1e-10" value="0.125">
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="format">Format</label>
                    <select id="format">
                        <option value="float32">Float32</option>
                        <option value="bfloat16">BFloat16</option>
                        <option value="float16">Float16</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="round-mode">Rounding Mode</label>
                    <select id="round-mode">
                        <option value="rne">Nearest Even</option>
                        <option value="rno">Nearest Odd</option>
                        <option value="rtz">Towards Zero</option>
                        <option value="rtposinf">Towards +Inf</option>
                        <option value="rtneginf">Towards -Inf</option>
                        <option value="rthalfzero">Half Towards Zero</option>
                        <option value="rthalfposinf">Half Towards +Inf</option>
                        <option value="rthalfneginf">Half Towards -Inf</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="overflow-mode">Overflow Mode</label>
                    <select id="overflow-mode">
                        <option value="satmax">Saturate Max</option>
                        <option value="satinf">Saturate Inf</option>
                        <option value="nan">NaN</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="underflow-mode">Underflow Mode</label>
                <select id="underflow-mode">
                    <option value="satmin">Saturate Min</option>
                    <option value="flushzero">Flush to Zero</option>
                </select>
            </div>
            
            <button id="convert-btn" onclick="performConvert()" disabled>Convert</button>
        </div>
        
        <div class="card" id="result">
            <div class="result-header" id="result-format"></div>
            <div id="result-content"></div>
        </div>
        
        <div class="card" id="error-card" style="display:none;">
            <div class="error" id="error-message"></div>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <p>Loading WebAssembly module...</p>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        let wasmReady = false;
        
        async function initWasm() {
            try {
                const go = new Go();
                const response = await fetch('float_conv.wasm');
                const bytes = await response.arrayBuffer();
                const { instance } = await WebAssembly.instantiate(bytes, go.importObject);
                go.run(instance);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('convert-btn').disabled = false;
                wasmReady = true;
            } catch (err) {
                document.getElementById('loading').innerHTML = '<p style="color:#ff6b6b;">Failed to load WebAssembly: ' + err.message + '</p>';
            }
        }
        
        function performConvert() {
            if (!wasmReady) return;
            
            const number = document.getElementById('number').value;
            const format = document.getElementById('format').value;
            const roundMode = document.getElementById('round-mode').value;
            const overflowMode = document.getElementById('overflow-mode').value;
            const underflowMode = document.getElementById('underflow-mode').value;
            
            const result = window.floatConvConvert(number, format, roundMode, overflowMode, underflowMode);
            
            try {
                const data = JSON.parse(result);
                displayResult(data);
            } catch (e) {
                showError('Failed to parse result: ' + result);
            }
        }
        
        function displayResult(data) {
            document.getElementById('error-card').style.display = 'none';
            document.getElementById('result').classList.add('show');
            
            document.getElementById('result-format').textContent = data.format;
            
            const statusClass = data.status === 'Overflow' ? 'status-overflow' : 
                               data.status === 'Underflow' ? 'status-underflow' : 'status-fits';
            
            let html = `
                <table class="bit-table">
                    <tr><th>Sign</th><th>Exponent</th><th>Mantissa</th></tr>
                    <tr><td>${data.sign}</td><td>${data.exponent}</td><td>${data.mantissa}</td></tr>
                </table>
                
                <div class="result-row"><span class="result-label">Decimal</span><span class="result-value">${data.decimal}</span></div>
                <div class="result-row"><span class="result-label">Hexfloat</span><span class="result-value">${data.hexfloat}</span></div>
                <div class="result-row"><span class="result-label">Binary</span><span class="result-value">${data.binary}</span></div>
                <div class="result-row"><span class="result-label">Hexadecimal</span><span class="result-value">${data.hexadecimal}</span></div>
                <div class="result-row"><span class="result-label">Accuracy</span><span class="result-value">${data.accuracy}</span></div>
                <div class="result-row"><span class="result-label">Conversion Error</span><span class="result-value">${data.error}</span></div>
                <div class="result-row"><span class="result-label">Status</span><span class="result-value"><span class="status ${statusClass}">${data.status}</span></span></div>
            `;
            
            document.getElementById('result-content').innerHTML = html;
        }
        
        function showError(msg) {
            document.getElementById('result').classList.remove('show');
            document.getElementById('error-card').style.display = 'block';
            document.getElementById('error-message').textContent = msg;
        }
        
        initWasm();
    </script>
</body>
</html>
