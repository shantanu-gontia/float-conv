<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Converter</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --border: #e2e5ea;
            --text: #1a1d21;
            --text-secondary: #6b7280;
            --accent: #3b82f6;
            --accent-light: #eff6ff;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        [data-theme="dark"] {
            --bg: #1a1d21;
            --surface: #252930;
            --border: #3a3f47;
            --text: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #60a5fa;
            --accent-light: #1e3a5f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 3rem 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .theme-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .theme-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 30px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            transition: background 0.15s;
        }

        .theme-btn:hover {
            background: var(--border);
        }

        .theme-btn.active {
            background: var(--accent);
        }

        .theme-btn.active .icon {
            filter: grayscale(100%) brightness(2);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        input[type="text"] {
            font-family: var(--font-mono);
            font-size: 1rem;
            padding: 0.75rem 1rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        select {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            padding: 0.65rem 0.875rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        select option {
            background: var(--surface);
        }

        button {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.875rem 1.5rem;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            opacity: 0.85;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .output {
            display: none;
            padding-top: 1.5rem;
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .output.show {
            display: block;
        }

        .output-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.25rem;
        }

        .bits {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .bit-item {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .bit-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }

        .bit-value {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            padding: 0.35rem 0.6rem;
            border-radius: 6px;
            text-align: center;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .result-value {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text);
        }

        .status-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .status-fits {
            background: #dcfce7;
            color: #166534;
        }

        [data-theme="dark"] .status-fits {
            background: #14532d;
            color: #86efac;
        }

        .status-overflow {
            background: #fee2e2;
            color: #991b1b;
        }

        [data-theme="dark"] .status-overflow {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .status-underflow {
            background: #fef3c7;
            color: #92400e;
        }

        [data-theme="dark"] .status-underflow {
            background: #78350f;
            color: #fcd34d;
        }

        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #fee2e2;
            border-radius: 10px;
            font-size: 0.875rem;
            color: #991b1b;
        }

        [data-theme="dark"] .error-box {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .error-box.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            body { padding: 1.5rem 1rem; }
            .card { padding: 1.5rem; }
            .row { grid-template-columns: 1fr; }
            .bits { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Float Converter</h1>
            <div class="theme-toggle">
                <button class="theme-btn active" id="theme-system" onclick="setTheme('system')" title="System">
                    <span class="icon">💻</span>
                </button>
                <button class="theme-btn" id="theme-light" onclick="setTheme('light')" title="Light">
                    <span class="icon">☀️</span>
                </button>
                <button class="theme-btn" id="theme-dark" onclick="setTheme('dark')" title="Dark">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </header>

        <div class="card">
            <div class="section">
                <label class="label" for="number">Input Value</label>
                <input type="text" id="number" value="0.125" placeholder="e.g., 0.125 or 1e-10">
            </div>

            <div class="section">
                <div class="row">
                    <div>
                        <label class="label" for="format">Format</label>
                        <select id="format">
                            <option value="float32">Float32</option>
                            <option value="bfloat16">BFloat16</option>
                            <option value="float16">Float16</option>
                        </select>
                    </div>
                    <div>
                        <label class="label" for="round-mode">Rounding</label>
                        <select id="round-mode">
                            <option value="rne">Nearest Even</option>
                            <option value="rno">Nearest Odd</option>
                            <option value="rtz">Towards Zero</option>
                            <option value="rtposinf">Towards +Inf</option>
                            <option value="rtneginf">Towards -Inf</option>
                            <option value="rthalfzero">Half to Zero</option>
                            <option value="rthalfposinf">Half to +Inf</option>
                            <option value="rthalfneginf">Half to -Inf</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <div>
                        <label class="label" for="overflow-mode">Overflow</label>
                        <select id="overflow-mode">
                            <option value="satmax">Saturate Max</option>
                            <option value="satinf">Saturate Inf</option>
                            <option value="nan">NaN</option>
                        </select>
                    </div>
                    <div>
                        <label class="label" for="underflow-mode">Underflow</label>
                        <select id="underflow-mode">
                            <option value="satmin">Saturate Min</option>
                            <option value="flushzero">Flush to Zero</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section">
                <button id="convert-btn" onclick="performConvert()" disabled>Convert</button>
            </div>

            <div class="output" id="output">
                <div class="output-title">Result</div>
                <div class="bits">
                    <div class="bit-item">
                        <span class="bit-label">Sign</span>
                        <span class="bit-value" id="bit-sign">0</span>
                    </div>
                    <div class="bit-item">
                        <span class="bit-label">Exponent</span>
                        <span class="bit-value" id="bit-exponent">00000000</span>
                    </div>
                    <div class="bit-item">
                        <span class="bit-label">Mantissa</span>
                        <span class="bit-value" id="bit-mantissa">00000000000000000000000</span>
                    </div>
                </div>
                <div class="results">
                    <div class="result-row">
                        <span class="result-label">Decimal</span>
                        <span class="result-value" id="res-decimal">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Hexfloat</span>
                        <span class="result-value" id="res-hexfloat">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Binary</span>
                        <span class="result-value" id="res-binary">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Hexadecimal</span>
                        <span class="result-value" id="res-hex">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Accuracy</span>
                        <span class="result-value" id="res-accuracy">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Error</span>
                        <span class="result-value" id="res-error">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Status</span>
                        <span class="result-value" id="res-status">—</span>
                    </div>
                </div>
            </div>

            <div class="error-box" id="error-box"></div>
        </div>
    </div>

    <div class="loading" id="loading">
        Loading...
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        function setTheme(theme) {
            if (theme === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            localStorage.setItem('float-conv-theme', theme);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('theme-' + theme).classList.add('active');
        }

        (function initTheme() {
            const saved = localStorage.getItem('float-conv-theme') || 'system';
            setTheme(saved);
        })();

        let wasmReady = false;

        async function initWasm() {
            try {
                const go = new Go();
                const response = await fetch('float_conv.wasm');
                const bytes = await response.arrayBuffer();
                const { instance } = await WebAssembly.instantiate(bytes, go.importObject);
                go.run(instance);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('convert-btn').disabled = false;
                wasmReady = true;
            } catch (err) {
                document.getElementById('loading').innerHTML = 'Failed to load: ' + err.message;
            }
        }

        function performConvert() {
            if (!wasmReady) return;

            const number = document.getElementById('number').value;
            const format = document.getElementById('format').value;
            const roundMode = document.getElementById('round-mode').value;
            const overflowMode = document.getElementById('overflow-mode').value;
            const underflowMode = document.getElementById('underflow-mode').value;

            const result = window.floatConvConvert(number, format, roundMode, overflowMode, underflowMode);

            try {
                const data = JSON.parse(result);
                displayResult(data);
            } catch (e) {
                showError('Parse error: ' + result);
            }
        }

        function displayResult(data) {
            document.getElementById('error-box').classList.remove('show');
            document.getElementById('output').classList.add('show');

            document.getElementById('bit-sign').textContent = data.sign;
            document.getElementById('bit-exponent').textContent = data.exponent;
            document.getElementById('bit-mantissa').textContent = data.mantissa;
            document.getElementById('res-decimal').textContent = data.decimal;
            document.getElementById('res-hexfloat').textContent = data.hexfloat;
            document.getElementById('res-binary').textContent = data.binary;
            document.getElementById('res-hex').textContent = data.hexadecimal;
            document.getElementById('res-accuracy').textContent = data.accuracy;
            document.getElementById('res-error').textContent = data.error;

            const statusEl = document.getElementById('res-status');
            const statusClass = data.status === 'Overflow' ? 'status-overflow' :
                               data.status === 'Underflow' ? 'status-underflow' : 'status-fits';
            statusEl.innerHTML = '<span class="status-badge ' + statusClass + '">' + data.status + '</span>';
        }

        function showError(msg) {
            document.getElementById('output').classList.remove('show');
            document.getElementById('error-box').classList.add('show');
            document.getElementById('error-box').textContent = msg;
        }

        initWasm();
    </script>
</body>
</html>
